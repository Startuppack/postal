name: build-postal
on:
  push:
  workflow_dispatch:
jobs:
  build:
    runs-on: podman
    env:
      DOCKER_BUILDKIT: "0"
    steps:
      - uses: actions/checkout@v4
      - name: Build + push (podman, builder classique)
        run: |
          set -e
          REG="${{ secrets.HARBOR_REGISTRY }}"; IMG="$REG/startuppack/postal"
          SHORT="${GITHUB_SHA::7}"
          BRANCH="${GITHUB_REF_NAME//\//-}"
          PUSH_TAGS="$SHORT $BRANCH"
          if [ "$GITHUB_REF_NAME" = "main" ]; then PUSH_TAGS="$PUSH_TAGS latest"; fi
          echo "${{ secrets.HARBOR_PASSWORD }}" | docker login "$REG" -u "${{ secrets.HARBOR_USER }}" --password-stdin
          BUILD_TAGS=""
          for t in $PUSH_TAGS; do BUILD_TAGS="$BUILD_TAGS -t $IMG:$t"; done
          DOCKER_BUILDKIT=0 docker build --target full $BUILD_TAGS .
          for t in $PUSH_TAGS; do docker push "$IMG:$t"; done
          echo "OK: pushed $IMG ($PUSH_TAGS)"
