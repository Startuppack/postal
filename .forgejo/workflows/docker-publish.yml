name: Build and push Docker image

# CI/CD runs on Forgejo Actions (org `intern`), NOT GitHub Actions (GitHub
# billing is disabled). The Forgejo runner has no ghcr.io credential — only the
# Harbor secrets (HARBOR_USER / HARBOR_PASSWORD / HARBOR_REGISTRY) exist — so we
# publish the runtime image to Harbor, exactly like every other service. The old
# `.github/workflows/ci.yml` (buildx + ghcr) can never succeed here: buildx's
# docker-container driver dies under podman and ghcr auth is unavailable.

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: public-harbor.gottaphish.com
  HARBOR_PROJECT: startuppack
  IMAGE_NAME: postal

jobs:
  docker:
    name: Build and push
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare image metadata
        id: meta
        shell: bash
        run: |
          short_sha="${GITHUB_SHA::7}"
          image="${REGISTRY}/${HARBOR_PROJECT}/${IMAGE_NAME}"
          tags="${image}:${short_sha}"
          if [[ "${GITHUB_REF_NAME}" == "main" ]]; then
            tags="${tags},${image}:latest"
          fi
          echo "image=${image}" >> "$GITHUB_OUTPUT"
          echo "tags=${tags}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${short_sha}" >> "$GITHUB_OUTPUT"

      - name: Login to Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          # The Forgejo org secret is HARBOR_USER (not HARBOR_USERNAME); keep a
          # robust fallback chain identical to the other repos' workflows.
          username: ${{ vars.HARBOR_USERNAME || secrets.HARBOR_USERNAME || secrets.HARBOR_USER || 'startuppack' }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      # The Forgejo runner uses PODMAN: docker/setup-buildx-action spins up a
      # buildkit container that fails ("cannot set cgroup parent if not creating
      # cgroups"). Build with the classic builder (DOCKER_BUILDKIT=0), targeting
      # the `full` stage (assets precompiled), then push each tag.
      - name: Build and push
        shell: bash
        env:
          DOCKER_BUILDKIT: "0"
        run: |
          IFS=',' read -ra TAGS <<< "${{ steps.meta.outputs.tags }}"
          TAGARGS=()
          for t in "${TAGS[@]}"; do TAGARGS+=( -t "$t" ); done
          docker build "${TAGARGS[@]}" \
            --target full \
            --build-arg VERSION="${{ steps.meta.outputs.short_sha }}" \
            --build-arg BRANCH=main \
            -f ./Dockerfile .
          for t in "${TAGS[@]}"; do docker push "$t"; done
